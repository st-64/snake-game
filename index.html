<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game Pro</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0aaa47">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./snake-logo.jpg">
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
</head>

<body>
    <main>
        <section>
            <div class="infos">
                <div class="info">
                    <span class="label">High Score:</span>
                    <span id="high-score" class="value">0</span>
                </div>
                <div class="info">
                    <span class="label">Score:</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="info">
                    <span class="label">Time:</span>
                    <span id="time" class="value">00-00</span>
                </div>
            </div>

            <div class="board"></div>

            <div id="start-card" class="modal">
                <h2>Snake Game Pro</h2>
                <p>Press Enter or click to play</p>
                <button id="start-btn">Start Game</button>
            </div>

            <div id="game-over-card" class="modal hidden">
                <h2 id="game-over-title">Game Over!</h2>
                <p id="game-over-msg">Message yahan aayega</p>
                <div class="score-board">
                    <p>Score: <span id="final-score">0</span></p>
                    <p>High Score: <span id="final-high-score">0</span></p>
                </div>
                <button id="restart-btn">Play Again (Enter)</button>
            </div>

            <div id="level-up-card" class="modal hidden">
                <h2 id="level-title">Level Up! 🚀</h2>
                <p>Welcome to Level <span id="current-level">2</span></p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
